name: klassify
description: "Klassify – AI-powered offline-first study app. Scan PDFs, generate flashcards and podcasts, sync to Google Drive."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2

  # Document scanning (Android / iOS only)
  google_mlkit_document_scanner: ^0.4.1

  # Flashcard swipe UI
  appinio_swiper: ^2.1.1

  # Audio playback
  just_audio: ^0.10.5

  # Google auth & Drive
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.2

  # Local persistence
  shared_preferences: ^2.5.5

  # AI
  google_generative_ai: ^0.4.7

  # Utilities
  path_provider: ^2.1.5
  http: ^1.6.0
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  share_plus: ^12.0.2

  # Background sync (Android / iOS only)
  workmanager: ^0.9.0+3

  # TTS
  flutter_tts: ^4.2.5

  # PDF processing
  syncfusion_flutter_pdf: ^33.2.12

  # Crash reporting
  sentry_flutter: ^9.22.0

  # UI
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^2.0.1
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
